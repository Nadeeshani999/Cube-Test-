<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENAKA GROUP — Cube Test Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e1a; --bg2: #0f1525; --bg3: #141b2d;
      --card: #1a2235; --card2: #1f2940; --border: #2a3550;
      --accent: #3b82f6; --accent2: #06b6d4; --accent3: #10b981;
      --warn: #f59e0b; --danger: #ef4444;
      --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --pass: #10b981; --fail: #ef4444; --pending: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; padding: .75rem 1.25rem;
    }
    .tb-brand { display: flex; align-items: center; gap: .6rem; }
    .tb-icon { font-size: 1.4rem; }
    .tb-title { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    .tb-sub { font-size: .7rem; color: var(--text3); }
    .tb-spacer { flex: 1; }
    #tb-clock { font-size: .8rem; color: var(--text2); }

    #tab-bar {
      display: flex; background: var(--bg2);
      border-bottom: 2px solid var(--border); overflow-x: auto; scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: .65rem 1.1rem; font-size: .8rem; font-weight: 600;
      color: var(--text2); background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      white-space: nowrap; transition: all .2s; letter-spacing: .03em;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg3); }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); background: rgba(6,182,212,.06); }

    .page { display: none; padding: 1.25rem; }
    .page.active { display: block; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text2); font-size: .85rem; }

    .error-wrap { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 10px; padding: 1.5rem; margin: 1rem 0; }
    .error-title { color: var(--danger); font-weight: 700; margin-bottom: .5rem; }
    .error-msg { color: var(--text2); font-size: .8rem; line-height: 1.6; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .75rem; margin-bottom: 1.25rem; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; position: relative; overflow: hidden;
    }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent2); }
    .kpi-card.green::before { background: var(--pass); }
    .kpi-card.amber::before { background: var(--warn); }
    .kpi-card.red::before   { background: var(--danger); }
    .kpi-card.blue::before  { background: var(--accent); }
    .kpi-card.cyan::before  { background: var(--accent2); }
    .kpi-label { font-size: .68rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; }
    .kpi-val   { font-size: 1.6rem; font-weight: 700; }
    .kpi-sub   { font-size: .7rem; color: var(--text2); margin-top: .2rem; }
    .kpi-text-sm      { font-size: .72rem; font-weight: 600; word-break: break-all; line-height: 1.4; color: var(--text); }
    .kpi-text-product { font-size: 1.15rem; font-weight: 700; color: var(--text); }

    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; overflow: hidden; }
    .chart-card.wide { grid-column: span 2; }
    .chart-title { font-size: .8rem; font-weight: 600; margin-bottom: .2rem; }
    .chart-sub   { font-size: .68rem; color: var(--text3); margin-bottom: .5rem; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: .6rem; }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: .68rem; color: var(--text2); }
    .chart-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-box   { position: relative; }

    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.25rem; }
    .table-hdr  { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: .5rem; }
    .table-hdr-title { font-size: .85rem; font-weight: 600; }
    .tbl-search { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: .35rem .7rem; color: var(--text); font-size: .75rem; width: 200px; }
    .tbl-search:focus { outline: none; border-color: var(--accent2); }
    .tbl-wrap { overflow-x: auto; max-height: 460px; overflow-y: auto; }
    table.dt { width: 100%; border-collapse: collapse; font-size: .75rem; }
    table.dt th {
      background: var(--bg3); color: var(--text2); padding: .6rem .8rem;
      text-align: left; font-weight: 600; font-size: .68rem; text-transform: uppercase;
      letter-spacing: .04em; position: sticky; top: 0; z-index: 1;
      border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none;
    }
    table.dt th:hover { color: var(--accent2); }
    table.dt td { padding: .55rem .8rem; border-bottom: 1px solid #1a2235; white-space: nowrap; }
    table.dt tbody tr:hover { background: var(--card2); }
    table.dt .num { text-align: right; font-variant-numeric: tabular-nums; }

    .badge { display: inline-block; padding: .18rem .55rem; border-radius: 4px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .badge-pass    { background: rgba(16,185,129,.15); color: var(--pass);    border: 1px solid rgba(16,185,129,.3); }
    .badge-fail    { background: rgba(239,68,68,.15);  color: var(--danger);  border: 1px solid rgba(239,68,68,.3); }
    .badge-pending { background: rgba(245,158,11,.15); color: var(--warn);    border: 1px solid rgba(245,158,11,.3); }
    .badge-yes     { background: rgba(16,185,129,.12); color: var(--pass);    border: 1px solid rgba(16,185,129,.25); }
    .badge-no      { background: rgba(239,68,68,.12);  color: var(--danger);  border: 1px solid rgba(239,68,68,.25); }
    .badge-approved{ background: rgba(6,182,212,.12);  color: var(--accent2); border: 1px solid rgba(6,182,212,.25); }

    .str-bar  { height: 6px; border-radius: 3px; background: var(--bg3); width: 80px; display: inline-block; vertical-align: middle; overflow: hidden; }
    .str-fill { height: 100%; border-radius: 3px; background: var(--pass); transition: width .3s; }
    .str-fill.amber { background: var(--warn); }
    .str-fill.red   { background: var(--danger); }

    .pg-header { margin-bottom: 1.25rem; }
    .pg-title  { font-size: 1.2rem; font-weight: 700; }
    .pg-sub    { font-size: .75rem; color: var(--text2); margin-top: .2rem; }

    .filter-bar { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar label { font-size: .75rem; color: var(--text2); display: flex; gap: .4rem; align-items: center; }
    .filter-sel { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: .3rem .6rem; border-radius: 6px; font-size: .75rem; }

    .refresh-btn {
      background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.3);
      color: var(--accent2); padding: .35rem .8rem; border-radius: 6px;
      font-size: .75rem; cursor: pointer; transition: all .2s;
    }
    .refresh-btn:hover { background: rgba(6,182,212,.2); }
    .last-updated { font-size: .7rem; color: var(--text3); }

    @media (max-width: 640px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card.wide { grid-column: span 1; }
      #topbar { padding: .6rem .8rem; }
    }
  </style>
</head>
<body>

<header id="topbar">
  <div class="tb-brand">
    <span class="tb-icon">🧊</span>
    <div>
      <div class="tb-title">CUBE TEST MASTER SHEET</div>
      <div class="tb-sub">SENAKA GROUP — Production Quality Dashboard</div>
    </div>
  </div>
  <div class="tb-spacer"></div>
  <div id="tb-clock"></div>
</header>

<div id="tab-bar"></div>
<div id="pages-wrap"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzv_N81zXOp5wOLgRa5yqbSNmycdDIJCMn--VHnbh6UqcuDuU8OwEQJ9P2kD2apkpcbYQ/exec';
const SITES = ['Godagama', 'Kanabediara', 'Balangoda', 'Bataatha', 'Embilipitiya'];
const TARGET_MPA = 35;

const SITE_BEDS = {
  Godagama:     ['Bed 1','Bed 2','Bed 3','Bed 4'],
  Kanabediara:  ['Bed 1','Bed 2'],
  Balangoda:    ['Bed 1','Bed 2'],
  Bataatha:     ['Bed 1','Bed 2','Bed 3'],
  Embilipitiya: ['Bed 1','Bed 2','Bed 3'],
};

const COL = {
  tenderNo:        'Tender No',
  product:         'Product',
  castingDate:     'Casting Date ',
  productionStatus:'Production Status',
  bedNo:           'Bed No',
  lineNo:          'Line No',
  slot1:'Slot 1', slot2:'Slot 2', slot3:'Slot 3', slot4:'Slot 4',
  slot5:'Slot 5', slot6:'Slot 6', slot7:'Slot 7',
  dailyQty:        'Daily Production Qty',
  slump:           'Slump Test Result',
  ageToDays:       'Age to Date',
  test1Age:        '1st Test Age',
  test1Result:     '1st Test Result',
  test2Age:        '2nd Test Age',
  test2Result:     '2nd Test Result',
  test3Age:        '3rd Test Age',
  test3Result:     '3rd Test Result',
  approval:        'Approval to Line Release',
  lineReleasedDate:'Line Released Date',
};

let activeSite = SITES[0];
let chartInstances = {};
let sortState = {};
let siteData = {};
let lastUpdated = {};

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('tb-clock').textContent =
    now.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' }) +
    ' · ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Build tabs
const tabBar = document.getElementById('tab-bar');
SITES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (s === activeSite ? ' active' : '');
  btn.textContent = s;
  btn.dataset.site = s;
  btn.addEventListener('click', () => switchSite(s));
  tabBar.appendChild(btn);
});

// Build page shells
const pagesWrap = document.getElementById('pages-wrap');
SITES.forEach(site => {
  const page = document.createElement('div');
  page.className = 'page' + (site === activeSite ? ' active' : '');
  page.id = 'pg-' + site;
  page.innerHTML = buildPageShell(site);
  pagesWrap.appendChild(page);
});

function switchSite(site) {
  activeSite = site;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.site === site));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'pg-' + site));
  if (!siteData[site]) fetchSite(site);
}

function buildPageShell(site) {
  return `
  <div class="pg-header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
      <div>
        <h2 class="pg-title">🧊 ${site} — Cube Test Analysis</h2>
        <p class="pg-sub">Production quality tracking · Cube strength results · Age analysis</p>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span class="last-updated" id="last-updated-${site}"></span>
        <button class="refresh-btn" onclick="refreshSite('${site}')">⟳ Refresh</button>
      </div>
    </div>
  </div>
  <div id="content-${site}">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Loading data from Google Sheet...</div>
    </div>
  </div>`;
}

// Fetch
async function fetchSite(site) {
  const contentEl = document.getElementById('content-' + site);
  contentEl.innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Loading ${site} data...</div>
    </div>`;
  try {
    const url = `${SCRIPT_URL}?sheet=${encodeURIComponent(site)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    if (raw.error) throw new Error(raw.error);
    siteData[site] = normalizeRows(raw);
    lastUpdated[site] = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const lu = document.getElementById('last-updated-' + site);
    if (lu) lu.textContent = 'Last updated: ' + lastUpdated[site];
    buildSiteContent(site);
    renderSite(site);
  } catch (err) {
    contentEl.innerHTML = `
      <div class="error-wrap">
        <div class="error-title">⚠ Data load failed</div>
        <div class="error-msg">Error: ${err.message}<br><br>
          Please check:<br>
          • Apps Script deployment has "Anyone" access<br>
          • Sheet tab name "${site}" is correct<br>
          • Internet connection is active
        </div>
        <button class="refresh-btn" style="margin-top:1rem" onclick="refreshSite('${site}')">⟳ Try Again</button>
      </div>`;
  }
}

function refreshSite(site) {
  delete siteData[site];
  fetchSite(site);
}

// Normalize
function normalizeRows(raw) {
  return raw.map(r => {
    const g = key => {
      if (r[key] !== undefined) return r[key];
      const trimKey = key.trim();
      for (const k of Object.keys(r)) {
        if (k.trim() === trimKey) return r[k];
      }
      return null;
    };
    const parseNum = v => {
      if (v === null || v === '' || v === undefined) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    };
    const parseDate = v => {
      if (!v) return '';
      if (v instanceof Date) return v.toISOString().split('T')[0];
      return String(v).split('T')[0];
    };
    return {
      tenderNo:         g(COL.tenderNo)          || '—',
      product:          g(COL.product)            || '—',
      castingDate:      parseDate(g(COL.castingDate)),
      productionStatus: String(g(COL.productionStatus) || '').toUpperCase(),
      bedNo:            g(COL.bedNo)              || '—',
      lineNo:           g(COL.lineNo)             || '—',
      dailyQty:         parseNum(g(COL.dailyQty)) || 0,
      slump:            g(COL.slump)              || '',
      ageToDays:        parseNum(g(COL.ageToDays)),
      test1Age:         parseNum(g(COL.test1Age)),
      test1Result:      parseNum(g(COL.test1Result)),
      test2Age:         parseNum(g(COL.test2Age)),
      test2Result:      parseNum(g(COL.test2Result)),
      test3Age:         parseNum(g(COL.test3Age)),
      test3Result:      parseNum(g(COL.test3Result)),
      approval:         g(COL.approval)           || '',
      lineReleasedDate: parseDate(g(COL.lineReleasedDate)),
    };
  }).filter(r => r.castingDate || r.tenderNo !== '—');
}

// Build site content
function buildSiteContent(site) {
  const contentEl = document.getElementById('content-' + site);
  const beds = SITE_BEDS[site] || [];
  const bedOptions = beds.map(b => `<option value="${b}">${b}</option>`).join('');

  contentEl.innerHTML = `
  <div class="kpi-row" id="kpi-${site}"></div>
  <div class="filter-bar">
    <label>Production Status:
      <select class="filter-sel" id="filt-status-${site}">
        <option value="">All</option>
        <option value="YES">YES</option>
        <option value="NO">NO</option>
      </select>
    </label>
    <label>Bed:
      <select class="filter-sel" id="filt-bed-${site}">
        <option value="">All Beds</option>
        ${bedOptions}
      </select>
    </label>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Daily Production Qty</div>
      <div class="chart-sub">Casting quantity per day</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-daily-${site}"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">1st Test Cube Strength</div>
      <div class="chart-sub">MPa by casting date (min target 33.5 MPa)</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-strength-${site}"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">1st vs 2nd vs 3rd Test</div>
      <div class="chart-sub">Parallel strength comparison per casting date</div>
      <div class="chart-legend">
        <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#22c55e"></span>1st Test</span>
        <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#f97316"></span>2nd Test</span>
        <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#ef4444"></span>3rd Test</span>
      </div>
      <div class="chart-box" style="height:200px"><canvas id="ch-compare-${site}"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Production by Bed</div>
      <div class="chart-sub">Slot utilisation per bed</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-bed-${site}"></canvas></div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Strength Distribution</div>
      <div class="chart-sub">All 2nd test results — pass/fail relative to ${TARGET_MPA} MPa threshold</div>
      <div class="chart-box" style="height:180px"><canvas id="ch-dist-${site}"></canvas></div>
    </div>
  </div>
  <div class="table-card">
    <div class="table-hdr">
      <span class="table-hdr-title">Production Register — ${site}</span>
      <input class="tbl-search" id="srch-${site}" placeholder="Search...">
    </div>
    <div class="tbl-wrap">
      <table class="dt" id="tbl-${site}">
        <thead><tr>
          <th data-col="tenderNo">Tender No</th>
          <th data-col="product">Product</th>
          <th data-col="castingDate">Casting Date</th>
          <th data-col="productionStatus">Cast</th>
          <th data-col="bedNo">Bed</th>
          <th data-col="lineNo">Line</th>
          <th data-col="dailyQty" class="num">Qty/Day</th>
          <th data-col="slump">Slump</th>
          <th data-col="ageToDays" class="num">Age (days)</th>
          <th data-col="test1Age" class="num">1st Age</th>
          <th data-col="test1Result" class="num">1st Result</th>
          <th data-col="test2Age" class="num">2nd Age</th>
          <th data-col="test2Result" class="num">2nd Result</th>
          <th data-col="test3Age" class="num">3rd Age</th>
          <th data-col="test3Result" class="num">3rd Result</th>
          <th data-col="approval">Approval</th>
          <th data-col="lineReleasedDate">Line Released</th>
          <th>Status</th>
        </tr></thead>
        <tbody id="tbody-${site}"></tbody>
      </table>
    </div>
  </div>`;
}

// Render
function getFiltered(site) {
  const rows   = siteData[site] || [];
  const status = document.getElementById('filt-status-' + site)?.value || '';
  const bed    = document.getElementById('filt-bed-'    + site)?.value || '';
  const srch   = (document.getElementById('srch-'       + site)?.value || '').toLowerCase();
  return rows.filter(r =>
    (!status || r.productionStatus === status) &&
    (!bed    || r.bedNo === bed) &&
    (!srch   || Object.values(r).join(' ').toLowerCase().includes(srch))
  );
}

function renderSite(site) {
  const rows = siteData[site] || [];
  renderKPIs(site, rows);
  renderCharts(site, rows);
  renderTable(site, getFiltered(site));
  ['filt-status-', 'filt-bed-'].forEach(prefix => {
    const el = document.getElementById(prefix + site);
    if (el) el.onchange = () => { renderCharts(site, getFiltered(site)); renderTable(site, getFiltered(site)); };
  });
  const srch = document.getElementById('srch-' + site);
  if (srch) srch.oninput = () => renderTable(site, getFiltered(site));
}

// KPIs
function renderKPIs(site, rows) {
  const castYes       = rows.filter(r => r.productionStatus === 'YES');
  const uniqueDates   = new Set(rows.map(r => r.castingDate).filter(Boolean));
  const totalCastDays = uniqueDates.size;
  const totalQty      = castYes.reduce((a, r) => a + (r.dailyQty || 0), 0);
  const with2nd       = castYes.filter(r => r.test2Result !== null);
  const with3rd       = castYes.filter(r => r.test3Result !== null);
  const with1st       = castYes.filter(r => r.test1Result !== null);
  const approved      = rows.filter(r => String(r.approval).toUpperCase() === 'YES').length;
  const released      = rows.filter(r => r.lineReleasedDate).length;
  const tenderNo      = rows[0]?.tenderNo || '—';
  const product       = rows[0]?.product  || '—';

  const el = document.getElementById('kpi-' + site);
  if (!el) return;
  el.innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">Tender No</div>
      <div class="kpi-text-sm">${tenderNo}</div>
    </div>
    <div class="kpi-card cyan">
      <div class="kpi-label">Product</div>
      <div class="kpi-text-product">${product}</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">Total Cast Days</div>
      <div class="kpi-val">${totalCastDays}</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Total Production Qty</div>
      <div class="kpi-val">${totalQty}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tested (1st)</div>
      <div class="kpi-val">${with1st.length}</div>
      <div class="kpi-sub">With 1st test results</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tested (3rd)</div>
      <div class="kpi-val">${with3rd.length}</div>
      <div class="kpi-sub">With 3rd test results</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Approved</div>
      <div class="kpi-val">${approved}</div>
      <div class="kpi-sub">Line release approved</div>
    </div>
    <div class="kpi-card cyan">
      <div class="kpi-label">Lines Released</div>
      <div class="kpi-val">${released}</div>
      <div class="kpi-sub">Released to date</div>
    </div>
  `;
}

// Charts
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

const CD = {
  plugins: {
    legend: { display: false },
    tooltip: { bodyColor: '#e2e8f0', titleColor: '#e2e8f0', backgroundColor: '#1f2940', borderColor: '#2a3550', borderWidth: 1 }
  },
  scales: {
    x: { ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 60 }, grid: { color: '#1e2d45' } },
    y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2d45' } }
  }
};

function renderCharts(site, rows) {
  const castYes = rows.filter(r => r.productionStatus === 'YES');

  // 1. Daily qty
  destroyChart('daily-' + site);
  const dailyDates = [...new Set(rows.map(r => r.castingDate))].sort().filter(Boolean);
  const dailyQtys  = dailyDates.map(d => rows.filter(r => r.castingDate === d).reduce((a, r) => a + r.dailyQty, 0));
  if (document.getElementById('ch-daily-' + site)) {
    chartInstances['daily-' + site] = new Chart(document.getElementById('ch-daily-' + site), {
      type: 'bar',
      data: { labels: dailyDates.map(d => d.slice(5)), datasets: [{ label: 'Units Cast', data: dailyQtys, backgroundColor: 'rgba(6,182,212,.7)', borderRadius: 4 }] },
      options: { ...CD, scales: { x: CD.scales.x, y: { ...CD.scales.y, beginAtZero: true } } }
    });
  }

  // 2. 1st test strength line
  destroyChart('strength-' + site);
  const withS = castYes.filter(r => r.test1Result !== null);
  const TARGET1 = 33.5;
  if (document.getElementById('ch-strength-' + site)) {
    chartInstances['strength-' + site] = new Chart(document.getElementById('ch-strength-' + site), {
      type: 'line',
      data: {
        labels: withS.map(r => r.castingDate.slice(5)),
        datasets: [{
          label: '1st Test MPa', data: withS.map(r => r.test1Result),
          borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,.1)',
          pointBackgroundColor: withS.map(r => r.test1Result >= TARGET1 ? '#10b981' : '#ef4444'),
          tension: .3, fill: true, pointRadius: 4
        }, {
          label: `Target (${TARGET1})`, data: withS.map(() => TARGET1),
          borderColor: 'rgba(245,158,11,.6)', borderDash: [5,4], pointRadius: 0
        }]
      },
      options: {
        plugins: { ...CD.plugins, legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 10 } } },
        scales: { x: CD.scales.x, y: { ...CD.scales.y, min: 20 } }
      }
    });
  }

  // 3. 1st vs 2nd vs 3rd Test
  destroyChart('compare-' + site);
  const withTests = castYes.filter(r =>
    r.test1Result !== null || r.test2Result !== null || r.test3Result !== null
  );
  const cmpLabels = withTests.map(r => r.castingDate.slice(5));
  const n = cmpLabels.length || 2;

  if (document.getElementById('ch-compare-' + site)) {
    chartInstances['compare-' + site] = new Chart(document.getElementById('ch-compare-' + site), {
      type: 'bar',
      data: {
        labels: cmpLabels,
        datasets: [
          {
            type: 'bar',
            label: '1st Test MPa',
            data: withTests.map(r => r.test1Result),
            backgroundColor: 'rgba(251,191,36,0.75)',
            borderColor: 'rgba(251,191,36,0.9)',
            borderWidth: 1,
            borderRadius: 3,
            order: 2,
          },
          {
            type: 'bar',
            label: '2nd Test MPa',
            data: withTests.map(r => r.test2Result),
            backgroundColor: 'rgba(16,185,129,0.75)',
            borderColor: 'rgba(16,185,129,0.9)',
            borderWidth: 1,
            borderRadius: 3,
            order: 2,
          },
          {
            type: 'bar',
            label: '3rd Test MPa',
            data: withTests.map(r => r.test3Result),
            backgroundColor: 'rgba(6,182,212,0.75)',
            borderColor: 'rgba(6,182,212,0.9)',
            borderWidth: 1,
            borderRadius: 3,
            order: 2,
          },
          {
            type: 'line',
            label: '1st Limit — 33.5 MPa',
            data: Array(n).fill(33.5),
            borderColor: '#22c55e',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            tension: 0,
            fill: false,
            order: 1,
            spanGaps: true,
            clip: false,
          },
          {
            type: 'line',
            label: '2nd Limit — 43.7 MPa',
            data: Array(n).fill(43.7),
            borderColor: '#f97316',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            tension: 0,
            fill: false,
            order: 1,
            spanGaps: true,
            clip: false,
          },
          {
            type: 'line',
            label: '3rd Limit — 50.0 MPa',
            data: Array(n).fill(50.0),
            borderColor: '#ef4444',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            tension: 0,
            fill: false,
            order: 1,
            spanGaps: true,
            clip: false,
          },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'top',
            labels: {
              color: '#94a3b8',
              font: { size: 10 },
              boxWidth: 14,
              padding: 8,
            }
          },
          tooltip: {
            bodyColor: '#e2e8f0', titleColor: '#e2e8f0',
            backgroundColor: '#1f2940', borderColor: '#2a3550', borderWidth: 1,
            callbacks: {
              label: ctx => ctx.raw !== null ? ` ${ctx.dataset.label}: ${ctx.raw} MPa` : null,
              filter: item => item.raw !== null
            }
          }
        },
        layout: { padding: { left: 0 } },
        scales: {
          x: {
            offset: false,
            ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 60, autoSkip: true },
            grid: { color: '#1e2d45', offset: false }
          },
          y: {
            min: 0,
            max: 60,
            ticks: {
              color: '#64748b', font: { size: 10 },
              stepSize: 10,
              callback: v => v + ' MPa'
            },
            grid: { color: '#1e2d45' }
          }
        }
      }
    });
  }

  // 4. Bed donut
  destroyChart('bed-' + site);
  const bedGroups = {};
  castYes.forEach(r => { bedGroups[r.bedNo] = (bedGroups[r.bedNo] || 0) + r.dailyQty; });
  if (document.getElementById('ch-bed-' + site)) {
    chartInstances['bed-' + site] = new Chart(document.getElementById('ch-bed-' + site), {
      type: 'doughnut',
      data: {
        labels: Object.keys(bedGroups),
        datasets: [{ data: Object.values(bedGroups), backgroundColor: ['rgba(59,130,246,.8)','rgba(6,182,212,.8)','rgba(16,185,129,.8)','rgba(245,158,11,.8)','rgba(239,68,68,.8)'], borderWidth: 2, borderColor: '#1a2235' }]
      },
      options: {
        plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 10 } }, tooltip: CD.plugins.tooltip },
        cutout: '65%'
      }
    });
  }

  // 5. Strength distribution
  destroyChart('dist-' + site);
  const all2nd = castYes.filter(r => r.test2Result !== null);
  const buckets = { '<25':0, '25–30':0, '30–35':0, '35–40':0, '40–45':0, '>45':0 };
  all2nd.forEach(r => {
    if      (r.test2Result < 25) buckets['<25']++;
    else if (r.test2Result < 30) buckets['25–30']++;
    else if (r.test2Result < 35) buckets['30–35']++;
    else if (r.test2Result < 40) buckets['35–40']++;
    else if (r.test2Result < 45) buckets['40–45']++;
    else                         buckets['>45']++;
  });
  if (document.getElementById('ch-dist-' + site)) {
    chartInstances['dist-' + site] = new Chart(document.getElementById('ch-dist-' + site), {
      type: 'bar',
      data: {
        labels: Object.keys(buckets),
        datasets: [{ label: 'Count', data: Object.values(buckets),
          backgroundColor: ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6'], borderRadius: 4 }]
      },
      options: { ...CD, indexAxis: 'y', scales: { x: { ...CD.scales.x, beginAtZero: true, ticks: { ...CD.scales.x.ticks, precision: 0 } }, y: CD.scales.y } }
    });
  }
}

// Table
function renderTable(site, rows) {
  const tbody = document.getElementById('tbody-' + site);
  if (!tbody) return;
  tbody.innerHTML = rows.map(r => {
    const castBadge = r.productionStatus === 'YES'
      ? '<span class="badge badge-yes">YES</span>'
      : '<span class="badge badge-no">NO</span>';
    let statusBadge = '<span class="badge badge-pending">Pending</span>';
    let strBar = '';
    if (r.test2Result !== null) {
      const pass = r.test2Result >= TARGET_MPA;
      statusBadge = pass
        ? '<span class="badge badge-pass">PASS</span>'
        : '<span class="badge badge-fail">FAIL</span>';
      const pct = Math.min(100, (r.test2Result / 50) * 100);
      const cls = r.test2Result >= 40 ? '' : r.test2Result >= TARGET_MPA ? 'amber' : 'red';
      strBar = `<div class="str-bar"><div class="str-fill ${cls}" style="width:${pct}%"></div></div>`;
    }
    const approvalBadge = r.approval
      ? (String(r.approval).toUpperCase() === 'YES'
          ? '<span class="badge badge-approved">Approved</span>'
          : `<span class="badge badge-pending">${r.approval}</span>`)
      : '—';
    return `<tr>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${r.tenderNo}">${r.tenderNo}</td>
      <td>${r.product}</td>
      <td>${r.castingDate}</td>
      <td>${castBadge}</td>
      <td>${r.bedNo}</td>
      <td>${r.lineNo}</td>
      <td class="num">${r.dailyQty || '—'}</td>
      <td>${r.slump || '—'}</td>
      <td class="num">${r.ageToDays ?? '—'}</td>
      <td class="num">${r.test1Age ?? '—'}</td>
      <td class="num">${r.test1Result !== null ? r.test1Result + ' MPa' : '—'}</td>
      <td class="num">${r.test2Age ?? '—'}</td>
      <td class="num">${r.test2Result !== null ? r.test2Result + ' MPa ' : '—'}${strBar}</td>
      <td class="num">${r.test3Age ?? '—'}</td>
      <td class="num">${r.test3Result !== null ? r.test3Result + ' MPa' : '—'}</td>
      <td>${approvalBadge}</td>
      <td>${r.lineReleasedDate || '—'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');

  document.querySelectorAll(`#tbl-${site} th`).forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (!col) return;
      const key = site + col;
      sortState[key] = !sortState[key];
      const sorted = [...rows].sort((a, b) => {
        const va = a[col], vb = b[col];
        if (va === null || va === undefined || va === '') return 1;
        if (vb === null || vb === undefined || vb === '') return -1;
        return sortState[key] ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      });
      renderTable(site, sorted);
    };
  });
}

// Init
fetchSite(activeSite);
SITES.filter(s => s !== activeSite).forEach((s, i) => {
  setTimeout(() => fetchSite(s), (i + 1) * 800);
});
</script>
