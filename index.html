<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENAKA GROUP — Cube Test Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #0f1525;
      --bg3: #141b2d;
      --card: #1a2235;
      --card2: #1f2940;
      --border: #2a3550;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --accent3: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --pass: #10b981;
      --fail: #ef4444;
      --pending: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── TOPBAR ── */
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; padding: .75rem 1.25rem;
    }
    .tb-brand { display: flex; align-items: center; gap: .6rem; }
    .tb-icon { font-size: 1.4rem; }
    .tb-title { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    .tb-sub { font-size: .7rem; color: var(--text3); }
    .tb-spacer { flex: 1; }
    #tb-clock { font-size: .8rem; color: var(--text2); }

    /* ── TABS ── */
    #tab-bar {
      display: flex; gap: 0; background: var(--bg2);
      border-bottom: 2px solid var(--border); overflow-x: auto;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: .65rem 1.1rem; font-size: .8rem; font-weight: 600;
      color: var(--text2); background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      white-space: nowrap; transition: all .2s; letter-spacing: .03em;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg3); }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); background: rgba(6,182,212,.06); }

    /* ── PAGES ── */
    .page { display: none; padding: 1.25rem; }
    .page.active { display: block; }

    /* ── KPI ROW ── */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .75rem; margin-bottom: 1.25rem; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent2);
    }
    .kpi-card.green::before { background: var(--pass); }
    .kpi-card.amber::before { background: var(--warn); }
    .kpi-card.red::before { background: var(--danger); }
    .kpi-card.blue::before { background: var(--accent); }
    .kpi-label { font-size: .68rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; }
    .kpi-val { font-size: 1.6rem; font-weight: 700; }
    .kpi-sub { font-size: .7rem; color: var(--text2); margin-top: .2rem; }

    /* ── CHARTS GRID ── */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .chart-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; overflow: hidden;
    }
    .chart-card.wide { grid-column: span 2; }
    .chart-title { font-size: .8rem; font-weight: 600; margin-bottom: .2rem; }
    .chart-sub { font-size: .68rem; color: var(--text3); margin-bottom: .75rem; }
    .chart-box { position: relative; }

    /* ── TABLE ── */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-hdr { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; border-bottom: 1px solid var(--border); }
    .table-hdr-title { font-size: .85rem; font-weight: 600; }
    .tbl-search { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: .35rem .7rem; color: var(--text); font-size: .75rem; width: 200px; }
    .tbl-search:focus { outline: none; border-color: var(--accent2); }
    .tbl-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }
    table.dt { width: 100%; border-collapse: collapse; font-size: .75rem; }
    table.dt th { background: var(--bg3); color: var(--text2); padding: .6rem .8rem; text-align: left; font-weight: 600; font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    table.dt th:hover { color: var(--accent2); }
    table.dt td { padding: .55rem .8rem; border-bottom: 1px solid #1a2235; white-space: nowrap; }
    table.dt tbody tr:hover { background: var(--card2); }
    table.dt .num { text-align: right; font-variant-numeric: tabular-nums; }

    .badge { display: inline-block; padding: .18rem .55rem; border-radius: 4px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .badge-pass { background: rgba(16,185,129,.15); color: var(--pass); border: 1px solid rgba(16,185,129,.3); }
    .badge-fail { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
    .badge-pending { background: rgba(245,158,11,.15); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
    .badge-yes { background: rgba(16,185,129,.12); color: var(--pass); border: 1px solid rgba(16,185,129,.25); }
    .badge-no { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.25); }

    /* strength bar */
    .str-bar { height: 6px; border-radius: 3px; background: var(--bg3); width: 80px; display: inline-block; vertical-align: middle; overflow: hidden; }
    .str-fill { height: 100%; border-radius: 3px; background: var(--pass); transition: width .3s; }
    .str-fill.amber { background: var(--warn); }
    .str-fill.red { background: var(--danger); }

    /* section header */
    .pg-header { margin-bottom: 1.25rem; }
    .pg-title { font-size: 1.2rem; font-weight: 700; }
    .pg-sub { font-size: .75rem; color: var(--text2); margin-top: .2rem; }

    /* filter bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar label { font-size: .75rem; color: var(--text2); display: flex; gap: .4rem; align-items: center; }
    .filter-sel { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: .3rem .6rem; border-radius: 6px; font-size: .75rem; }

    /* toast */
    #toast-wrap { position: fixed; bottom: 1rem; right: 1rem; z-index: 999; display: flex; flex-direction: column; gap: .5rem; }
    .toast { background: var(--card2); border: 1px solid var(--border); padding: .6rem 1rem; border-radius: 8px; font-size: .78rem; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    @media (max-width: 640px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card.wide { grid-column: span 1; }
      #topbar { padding: .6rem .8rem; }
    }
  </style>
</head>
<body>

<header id="topbar">
  <div class="tb-brand">
    <span class="tb-icon">🧊</span>
    <div>
      <div class="tb-title">CUBE TEST MASTER SHEET</div>
      <div class="tb-sub">SENAKA GROUP — Production Quality Dashboard</div>
    </div>
  </div>
  <div class="tb-spacer"></div>
  <div id="tb-clock"></div>
</header>

<div id="tab-bar"></div>

<div id="pages-wrap"></div>

<div id="toast-wrap"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA — Based on Kanabediara sheet visible in screenshot
// Structured to represent all 5 sites
// ═══════════════════════════════════════════════════════════

const SITES = ['Godagama', 'Kanabediara', 'Balangoda', 'Bataatha', 'Embilipitiya'];

// Generate realistic data for each site based on the screenshot structure
function makeRows(siteKey, tenderNo, count, seedOffset) {
  const rows = [];
  const beds = ['Bed 1', 'Bed 2'];
  const lines = ['Line A', 'Line B', 'Line C', 'Line D', 'Line E', 'Line F', 'Line G', 'Line H'];
  const product = '11M-500KG';
  let slotCounter = 1 + seedOffset;
  const startDate = new Date('2026-04-20');

  for (let i = 0; i < count; i++) {
    const d = new Date(startDate);
    d.offset = 0;
    d.setDate(startDate.getDate() + Math.floor(i * 1.4));
    const dateStr = d.toISOString().split('T')[0];
    const bed = beds[i % 2];
    const line = lines[i % lines.length];
    const prodStatus = i < count - 3 ? 'YES' : (i === count - 2 ? 'NO' : 'NO');
    const dailyQty = [1,2,4,4,2,3,4,6,1,2,4,3,5,6,1][i % 15] || 2;
    const slots = [];
    for (let s = 0; s < dailyQty && slots.length < 7; s++) {
      slots.push(slotCounter++);
    }
    // Cube test results
    const age28 = prodStatus === 'YES' ? (Math.round((35 + Math.sin(i * 1.3 + seedOffset) * 10) * 10) / 10) : null;
    const age7 = prodStatus === 'YES' ? (Math.round((age28 * 0.7 + Math.random() * 2 - 1) * 10) / 10) : null;
    const slump = i === 1 ? '05mm' : null;
    const ageDays = prodStatus === 'YES' ? Math.max(5, 30 - i) : null;
    rows.push({
      tenderNo, product, castingDate: dateStr, productionStatus: prodStatus,
      bedNo: bed, lineNo: line,
      slot1: slots[0]||'', slot2: slots[1]||'', slot3: slots[2]||'',
      slot4: slots[3]||'', slot5: slots[4]||'', slot6: slots[5]||'', slot7: slots[6]||'',
      dailyProductionQty: dailyQty, slumpTestResult: slump,
      ageToDays: ageDays, testAge1: ageDays ? 7 : null, result1: age7,
      testAge2: ageDays ? 28 : null, result2: age28
    });
  }
  return rows;
}

const DATA = {
  Godagama: makeRows('Godagama', 'GP1/CE(COM)/PPC/2025/280', 26, 0),
  Kanabediara: makeRows('Kanabediara', 'CP2/CE(COM)/PPC/2025/340', 29, 78),
  Balangoda: makeRows('Balangoda', 'BL3/CE(COM)/PPC/2025/295', 22, 160),
  Bataatha: makeRows('Bataatha', 'BT4/CE(COM)/PPC/2025/310', 18, 240),
  Embilipitiya: makeRows('Embilipitiya', 'EM5/CE(COM)/PPC/2025/320', 24, 310),
};

// ═══ CLOCK ═══
function updateClock() {
  const now = new Date();
  document.getElementById('tb-clock').textContent =
    now.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' }) +
    ' · ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ═══ STATE ═══
let activeSite = 'Kanabediara';
let chartInstances = {};
let sortState = {};

// ═══ BUILD TABS ═══
const tabBar = document.getElementById('tab-bar');
SITES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (s === activeSite ? ' active' : '');
  btn.textContent = s;
  btn.dataset.site = s;
  btn.addEventListener('click', () => switchSite(s));
  tabBar.appendChild(btn);
});

// ═══ BUILD PAGES ═══
const pagesWrap = document.getElementById('pages-wrap');
SITES.forEach(site => {
  const page = document.createElement('div');
  page.className = 'page' + (site === activeSite ? ' active' : '');
  page.id = 'pg-' + site;
  page.innerHTML = buildPageHTML(site);
  pagesWrap.appendChild(page);
});

function switchSite(site) {
  activeSite = site;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.site === site));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'pg-' + site));
  renderSite(site);
}

// ═══ PAGE HTML TEMPLATE ═══
function buildPageHTML(site) {
  const id = site;
  return `
  <div class="pg-header">
    <h2 class="pg-title">🧊 ${site} — Cube Test Analysis</h2>
    <p class="pg-sub">Production quality tracking · Cube strength results · Age analysis</p>
  </div>
  <div class="kpi-row" id="kpi-${id}"></div>
  <div class="filter-bar">
    <label>Production Status:
      <select class="filter-sel" id="filt-status-${id}">
        <option value="">All</option><option>YES</option><option>NO</option>
      </select>
    </label>
    <label>Bed:
      <select class="filter-sel" id="filt-bed-${id}">
        <option value="">All Beds</option><option>Bed 1</option><option>Bed 2</option>
      </select>
    </label>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Daily Production Qty</div>
      <div class="chart-sub">Casting quantity per day</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-daily-${id}"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">28-Day Cube Strength Results</div>
      <div class="chart-sub">MPa by casting date (min target 35 MPa)</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-strength-${id}"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">7-Day vs 28-Day Strength</div>
      <div class="chart-sub">Early vs full-cure comparison</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-compare-${id}"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Production by Bed</div>
      <div class="chart-sub">Slot utilisation per bed & line</div>
      <div class="chart-box" style="height:220px"><canvas id="ch-bed-${id}"></canvas></div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Strength Distribution</div>
      <div class="chart-sub">All 28-day results — pass/fail relative to 35 MPa threshold</div>
      <div class="chart-box" style="height:180px"><canvas id="ch-dist-${id}"></canvas></div>
    </div>
  </div>
  <div class="table-card">
    <div class="table-hdr">
      <span class="table-hdr-title">Production Register — ${site}</span>
      <input class="tbl-search" id="srch-${id}" placeholder="Search…">
    </div>
    <div class="tbl-wrap">
      <table class="dt" id="tbl-${id}">
        <thead><tr>
          <th data-col="tenderNo">Tender No</th>
          <th data-col="castingDate">Casting Date ↕</th>
          <th data-col="productionStatus">Cast</th>
          <th data-col="bedNo">Bed</th>
          <th data-col="lineNo">Line</th>
          <th data-col="dailyProductionQty" class="num">Qty/Day</th>
          <th data-col="slumpTestResult">Slump</th>
          <th data-col="ageToDays" class="num">Age (days)</th>
          <th data-col="result1" class="num">7d (MPa)</th>
          <th data-col="result2" class="num">28d (MPa)</th>
          <th>Status</th>
        </tr></thead>
        <tbody id="tbody-${id}"></tbody>
      </table>
    </div>
  </div>`;
}

// ═══ RENDER ═══
function getFiltered(site) {
  const rows = DATA[site];
  const status = document.getElementById('filt-status-' + site)?.value || '';
  const bed = document.getElementById('filt-bed-' + site)?.value || '';
  const srch = (document.getElementById('srch-' + site)?.value || '').toLowerCase();
  return rows.filter(r =>
    (!status || r.productionStatus === status) &&
    (!bed || r.bedNo === bed) &&
    (!srch || Object.values(r).join(' ').toLowerCase().includes(srch))
  );
}

function renderSite(site) {
  const rows = DATA[site];
  renderKPIs(site, rows);
  renderCharts(site, rows);
  renderTable(site, getFiltered(site));

  // Attach filter listeners
  ['filt-status-', 'filt-bed-'].forEach(prefix => {
    const el = document.getElementById(prefix + site);
    if (el) el.onchange = () => { renderCharts(site, getFiltered(site)); renderTable(site, getFiltered(site)); };
  });
  const srch = document.getElementById('srch-' + site);
  if (srch) srch.oninput = () => renderTable(site, getFiltered(site));
}

function renderKPIs(site, rows) {
  const castYes = rows.filter(r => r.productionStatus === 'YES');
  const withStrength = castYes.filter(r => r.result2 !== null);
  const avg28 = withStrength.length ? (withStrength.reduce((a, r) => a + r.result2, 0) / withStrength.length).toFixed(1) : '—';
  const totalSlots = castYes.reduce((a, r) => a + r.dailyProductionQty, 0);
  const passCount = withStrength.filter(r => r.result2 >= 35).length;
  const failCount = withStrength.length - passCount;
  const passRate = withStrength.length ? ((passCount / withStrength.length) * 100).toFixed(0) : '—';

  const el = document.getElementById('kpi-' + site);
  el.innerHTML = `
    <div class="kpi-card blue"><div class="kpi-label">Total Cast Days</div><div class="kpi-val">${rows.length}</div><div class="kpi-sub">Production entries</div></div>
    <div class="kpi-card green"><div class="kpi-label">Total Units Cast</div><div class="kpi-val">${totalSlots}</div><div class="kpi-sub">Slots filled</div></div>
    <div class="kpi-card ${parseFloat(avg28) >= 35 ? 'green' : 'amber'}"><div class="kpi-label">Avg 28d Strength</div><div class="kpi-val">${avg28} MPa</div><div class="kpi-sub">Min target: 35 MPa</div></div>
    <div class="kpi-card ${passRate >= 90 ? 'green' : passRate >= 70 ? 'amber' : 'red'}"><div class="kpi-label">Pass Rate</div><div class="kpi-val">${passRate}%</div><div class="kpi-sub">${passCount} pass / ${failCount} fail</div></div>
    <div class="kpi-card"><div class="kpi-label">Tested Results</div><div class="kpi-val">${withStrength.length}</div><div class="kpi-sub">With 28d results</div></div>
  `;
}

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

const CHART_DEFAULTS = {
  color: '#94a3b8',
  plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } }, tooltip: { bodyColor: '#e2e8f0', titleColor: '#e2e8f0', backgroundColor: '#1f2940', borderColor: '#2a3550', borderWidth: 1 } },
  scales: {
    x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2d45' } },
    y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2d45' } }
  }
};

function renderCharts(site, rows) {
  const castYes = rows.filter(r => r.productionStatus === 'YES');

  // 1. Daily production qty
  destroyChart('daily-' + site);
  const dailyDates = [...new Set(rows.map(r => r.castingDate))].sort();
  const dailyQtys = dailyDates.map(d => rows.filter(r => r.castingDate === d).reduce((a, r) => a + r.dailyProductionQty, 0));
  chartInstances['daily-' + site] = new Chart(document.getElementById('ch-daily-' + site), {
    type: 'bar',
    data: { labels: dailyDates.map(d => d.slice(5)), datasets: [{ label: 'Units Cast', data: dailyQtys, backgroundColor: 'rgba(6,182,212,.7)', borderRadius: 4 }] },
    options: { ...CHART_DEFAULTS, plugins: { ...CHART_DEFAULTS.plugins, legend: { display: false } }, scales: { x: { ...CHART_DEFAULTS.scales.x, ticks: { ...CHART_DEFAULTS.scales.x.ticks, maxRotation: 60 } }, y: { ...CHART_DEFAULTS.scales.y, beginAtZero: true } } }
  });

  // 2. 28-day strength
  destroyChart('strength-' + site);
  const withS = castYes.filter(r => r.result2 !== null);
  chartInstances['strength-' + site] = new Chart(document.getElementById('ch-strength-' + site), {
    type: 'line',
    data: {
      labels: withS.map(r => r.castingDate.slice(5)),
      datasets: [{
        label: '28d MPa', data: withS.map(r => r.result2),
        borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,.1)',
        pointBackgroundColor: withS.map(r => r.result2 >= 35 ? '#10b981' : '#ef4444'),
        tension: .3, fill: true, pointRadius: 4
      }, {
        label: 'Target (35)', data: withS.map(() => 35),
        borderColor: 'rgba(245,158,11,.6)', borderDash: [5, 4], pointRadius: 0, tension: 0
      }]
    },
    options: { ...CHART_DEFAULTS, scales: { x: { ...CHART_DEFAULTS.scales.x, ticks: { ...CHART_DEFAULTS.scales.x.ticks, maxRotation: 60 } }, y: { ...CHART_DEFAULTS.scales.y, min: 25 } } }
  });

  // 3. 7d vs 28d scatter/bar
  destroyChart('compare-' + site);
  const both = castYes.filter(r => r.result1 !== null && r.result2 !== null);
  chartInstances['compare-' + site] = new Chart(document.getElementById('ch-compare-' + site), {
    type: 'bar',
    data: {
      labels: both.map(r => r.castingDate.slice(5)),
      datasets: [
        { label: '7-Day MPa', data: both.map(r => r.result1), backgroundColor: 'rgba(251,191,36,.7)', borderRadius: 3 },
        { label: '28-Day MPa', data: both.map(r => r.result2), backgroundColor: 'rgba(16,185,129,.7)', borderRadius: 3 }
      ]
    },
    options: { ...CHART_DEFAULTS, scales: { x: { ...CHART_DEFAULTS.scales.x, ticks: { ...CHART_DEFAULTS.scales.x.ticks, maxRotation: 60 } }, y: { ...CHART_DEFAULTS.scales.y, beginAtZero: true } } }
  });

  // 4. Production by Bed (donut)
  destroyChart('bed-' + site);
  const bedGroups = {};
  castYes.forEach(r => { bedGroups[r.bedNo] = (bedGroups[r.bedNo] || 0) + r.dailyProductionQty; });
  chartInstances['bed-' + site] = new Chart(document.getElementById('ch-bed-' + site), {
    type: 'doughnut',
    data: {
      labels: Object.keys(bedGroups),
      datasets: [{ data: Object.values(bedGroups), backgroundColor: ['rgba(59,130,246,.8)', 'rgba(6,182,212,.8)', 'rgba(16,185,129,.8)', 'rgba(245,158,11,.8)'], borderWidth: 2, borderColor: '#1a2235' }]
    },
    options: { ...CHART_DEFAULTS, cutout: '65%', plugins: { ...CHART_DEFAULTS.plugins } }
  });

  // 5. Strength distribution horizontal bar
  destroyChart('dist-' + site);
  const all28 = castYes.filter(r => r.result2 !== null);
  const buckets = { '<30': 0, '30–35': 0, '35–40': 0, '40–45': 0, '>45': 0 };
  all28.forEach(r => {
    if (r.result2 < 30) buckets['<30']++;
    else if (r.result2 < 35) buckets['30–35']++;
    else if (r.result2 < 40) buckets['35–40']++;
    else if (r.result2 < 45) buckets['40–45']++;
    else buckets['>45']++;
  });
  chartInstances['dist-' + site] = new Chart(document.getElementById('ch-dist-' + site), {
    type: 'bar',
    data: {
      labels: Object.keys(buckets),
      datasets: [{ label: 'Count', data: Object.values(buckets),
        backgroundColor: ['#ef4444','#f59e0b','#10b981','#06b6d4','#3b82f6'],
        borderRadius: 4 }]
    },
    options: { ...CHART_DEFAULTS, indexAxis: 'y', plugins: { ...CHART_DEFAULTS.plugins, legend: { display: false } }, scales: { x: { ...CHART_DEFAULTS.scales.x, beginAtZero: true, ticks: { ...CHART_DEFAULTS.scales.x.ticks, precision: 0 } }, y: { ...CHART_DEFAULTS.scales.y } } }
  });
}

function renderTable(site, rows) {
  const tbody = document.getElementById('tbody-' + site);
  const TARGET = 35;
  tbody.innerHTML = rows.map(r => {
    const castBadge = r.productionStatus === 'YES' ? '<span class="badge badge-yes">YES</span>' : '<span class="badge badge-no">NO</span>';
    let statusBadge = '<span class="badge badge-pending">Pending</span>';
    let strBar = '';
    if (r.result2 !== null) {
      const pass = r.result2 >= TARGET;
      statusBadge = pass ? '<span class="badge badge-pass">PASS</span>' : '<span class="badge badge-fail">FAIL</span>';
      const pct = Math.min(100, (r.result2 / 50) * 100);
      const cls = r.result2 >= 40 ? '' : r.result2 >= 35 ? 'amber' : 'red';
      strBar = `<div class="str-bar"><div class="str-fill ${cls}" style="width:${pct}%"></div></div>`;
    }
    return `<tr>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${r.tenderNo}</td>
      <td>${r.castingDate}</td>
      <td>${castBadge}</td>
      <td>${r.bedNo}</td>
      <td>${r.lineNo}</td>
      <td class="num">${r.dailyProductionQty}</td>
      <td>${r.slumpTestResult || '—'}</td>
      <td class="num">${r.ageToDays || '—'}</td>
      <td class="num">${r.result1 !== null ? r.result1 : '—'}</td>
      <td class="num">${r.result2 !== null ? r.result2 + ' ' + strBar : '—'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');

  // sort on th click
  document.querySelectorAll(`#tbl-${site} th`).forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (!col) return;
      const key = site + col;
      sortState[key] = !sortState[key];
      const sorted = [...rows].sort((a, b) => {
        const va = a[col], vb = b[col];
        if (va === null || va === undefined) return 1;
        if (vb === null || vb === undefined) return -1;
        return sortState[key] ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      });
      renderTable(site, sorted);
    };
  });
}

// ═══ INIT ═══
SITES.forEach(s => renderSite(s));
// only show active
document.querySelectorAll('.page').forEach(p => {
  if (!p.classList.contains('active')) {
    // charts rendered but hidden — ok, Chart.js handles this
  }
});
</script>
